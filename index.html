function renderNav(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelector(port==='international'?'.intl':'.partner').classList.add('active');const cityNav=document.getElementById('cityNav');const industryNav=document.getElementById('industryNav');const list=DATA.filter(e=>e.port===port);const cities=['全部',...uniq(list.map(e=>e.city)).sort()];cityNav.innerHTML=cities.map(c=>`<button class="btn ${c===city?'active':''}" onclick="city='${c}';industry='全部';render()">${c}</button>`).join('');const inds=['全部',...uniq(list.filter(e=>city==='全部'||e.city===city).map(e=>e.industry)).sort()];industryNav.innerHTML=inds.map(i=>`<button class="btn ${i===industry?'active':''}" onclick="industry='${i}';render()">${i}</button>`).join('')}
function render(){renderNav();const list=DATA.filter(e=>e.port===port&&(city==='全部'||e.city===city)&&(industry==='全部'||e.industry===industry));document.getElementById('statCities').textContent=uniq(DATA.map(e=>e.city)).length;document.getElementById('statIndustries').textContent=uniq(DATA.map(keyOf)).length;document.getElementById('statCompanies').textContent=DATA.length;const root=document.getElementById('content');root.innerHTML='';const groups=uniq(list.map(keyOf)).sort();if(!groups.length){root.innerHTML='<div class="empty">当前筛选下暂无企业，后续每日更新补充。</div>';return}groups.forEach(g=>{const rows=list.filter(e=>keyOf(e)===g);const section=document.createElement('section');section.className='group';section.innerHTML=`<div class="group-head"><div><div class="group-title">${g}</div><div class="group-sub">${port==='international'?'国际站标杆客户':'行业内合作企业'} · 按效果/机会优先排序</div></div><div class="count">${rows.length}/10 家</div></div>${rows.length<10?`<div class="warning">该组目前仅收录 ${rows.length} 家高把握企业；不足10家不强行添加，后续每日补充通过核验的新企业。</div>`:''}<div class="company-grid">${rows.map(e=>`<div class="company"><span class="label ${port==='international'?'intl':'partner'}">${port==='international'?'国际站标杆':'合作机会'}</span><div class="name">${e.name}</div><div class="meta"><b>主营：</b>${e.products}</div><div class="meta"><b>效果/公开信息：</b>${e.metrics}</div><div class="op"><b>机会点：</b>${e.opportunity}</div><div class="meta"><b>核验：</b>${e.verified}</div>${e.url?`<a class="link" href="${e.url}" target="_blank">查看来源 / 店铺 / 官网 →</a>`:''}</div>`).join('')}</div>`;root.appendChild(section)})}
window.onload=render;
</script>
</body>
</html>
