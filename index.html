B('遂昌/松阳/庆元：竹木、食用菌、茶叶','竹木制品、食用菌、茶叶、木制家居','B级','bamboo products, mushroom, tea, wooden homeware','农林产品适合品牌化 and 礼品化。'),
B('莲都/云和：玩具、木制品、文教用品','木制玩具、益智玩具、文教用品、童品','A级','wooden toys, educational toys, kids products','适合欧美早教、礼品 and 电商渠道。')]
}
];
function B(name,products,level,keywords,action){return{name,products,level,keywords,action}}
let current='全部';
function renderNav(){const nav=document.getElementById('nav'); nav.innerHTML=''; ['全部',...DATA.map(d=>d.city)].forEach(c=>{const b=document.createElement('button'); b.className='btn '+(c===current?'active':''); b.textContent=c; b.onclick=()=>{current=c; render()}; nav.appendChild(b);});}
function render(){renderNav(); const root=document.getElementById('cards'); root.innerHTML=''; DATA.forEach(city=>{if(current!=='全部'&&city.city!==current)return; const card=document.createElement('section'); card.className='card fade'; card.innerHTML=`<div class="card-head"><h2 class="city">${city.city}</h2><p class="role">${city.role}</p></div><div class="body">${city.belts.map(b=>`<div class="belt"><div class="belt-title"><b>${b.name}</b><span class="tag">${b.level}</span></div><div class="meta"><b>核心产业：</b>${b.products}</div><div class="chips">${b.keywords.split(',').map(k=>`<span class="chip">${k.trim()}</span>`).join('')}</div><div class="action"><b>开发切入：</b>${b.action}</div></div>`).join('')}</div>`; root.appendChild(card);});}
window.onload=render;
</script>
